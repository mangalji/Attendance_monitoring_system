{% extends "base.html" %}
{% block title %}Set New Password{% endblock title %}

{% block content %}
<h3>Set New Password</h3>
{% if validlink %}
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Update password</button>
</form>
{% else %}
<p>This password reset link is invalid or has expired.</p>
{% endif %}
{% endblock content %}
